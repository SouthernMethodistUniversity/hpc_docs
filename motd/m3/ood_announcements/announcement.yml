msg: |
  Beginning on July 1, 2026, the automations will be enabled to enforce
  the 60-day purge policy for $SCRATCH.  Files older than 60 days stored
  in $SCRATCH will be automatically and permanently deleted.

  If you have any questions or concerns, please contact the [IT Help Desk](https://www.smu.edu/oit/help).